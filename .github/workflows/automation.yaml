name: TRR Workflow

# Trigger: runs whenever Excel files in the data/ folder are updated
on:
  push:
    paths:
      - "data/*.xlsx"
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install pandas openpyxl

      # Step 4: Run your transformation script
      - name: Run transformation
        run: python scripts/transform.py

      # Step 5: Commit results back to repo
      - name: Commit results
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add output/
            git commit -m "Automated Excel transformation" || echo "No changes to commit"
            git push
